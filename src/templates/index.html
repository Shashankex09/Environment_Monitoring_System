<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Environmental Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #e8f5e9, #ffffff);
            text-align: center;
        }

        header {
            background: #2ecc71;
            color: white;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Combined Chart */
        .chart-container {
            width: 90%;
            max-width: 950px;
            height: 350px;
            margin: auto;
            position: relative;
        }

        /* Individual Charts */
        .grid {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .grid .card {
            flex: 1;
            min-width: 280px;
        }

        .small-chart {
            height: 220px;
            position: relative;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .tagline {
            font-style: italic;
            font-weight: bold;
            color: #1b5e20;
            margin: 20px 0;
        }

        /* Danger Screen */
        #dangerScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: red;
            font-size: 50px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #dangerScreen button {
            position: absolute;
            top: 20px;
            right: 30px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="dangerScreen">
    <button onclick="closeDanger()">Close</button>
    YOU WILL DIE
</div>

<header>🌍 Environmental Monitoring Dashboard</header>

<div class="container">

    <!-- Combined Graph -->
    <div class="card">
        <h2>Combined Environmental Graph</h2>
        <div class="chart-container">
            <canvas id="combinedChart"></canvas>
        </div>
    </div>

    <!-- Individual Graphs -->
    <div class="grid">

        <div class="card">
            <h3>Pollution</h3>
            <div class="value" id="pollution">0</div>
            <div class="small-chart">
                <canvas id="pollutionChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Temperature (°C)</h3>
            <div class="value" id="temperature">0</div>
            <div class="small-chart">
                <canvas id="temperatureChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Humidity (%)</h3>
            <div class="value" id="humidity">0</div>
            <div class="small-chart">
                <canvas id="humidityChart"></canvas>
            </div>
        </div>

    </div>

    <div class="tagline">
        Every Day is Earth Day — If You Care Enough.
    </div>

</div>

<script>
function createLineChart(canvasId, label, color) {
    return new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: label,
                data: [],
                borderColor: color,
                backgroundColor: color,
                fill: false,
                tension: 0.4,
                pointRadius: 2,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false
        }
    });
}

// Combined Chart with Multiple Y-Axes
const combinedChart = new Chart(document.getElementById('combinedChart'), {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: 'Pollution',
                data: [],
                borderColor: 'red',
                tension: 0.4,
                pointRadius: 2,
                yAxisID: 'yPollution'
            },
            {
                label: 'Temperature (°C)',
                data: [],
                borderColor: 'orange',
                tension: 0.4,
                pointRadius: 2,
                yAxisID: 'yTemperature'
            },
            {
                label: 'Humidity (%)',
                data: [],
                borderColor: 'blue',
                tension: 0.4,
                pointRadius: 2,
                yAxisID: 'yHumidity'
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: {
            mode: 'index',
            intersect: false
        },
        plugins: {
            legend: {
                position: 'top'
            }
        },
        scales: {
            x: {
                title: {
                    display: true,
                    text: 'Time'
                }
            },
            yPollution: {
                type: 'linear',
                position: 'left',
                title: {
                    display: true,
                    text: 'Pollution'
                },
                min: 0,
                max: 1200
            },
            yTemperature: {
                type: 'linear',
                position: 'right',
                title: {
                    display: true,
                    text: 'Temperature (°C)'
                },
                min: 0,
                max: 50,
                grid: {
                    drawOnChartArea: false
                }
            },
            yHumidity: {
                type: 'linear',
                position: 'right',
                offset: true,
                title: {
                    display: true,
                    text: 'Humidity (%)'
                },
                min: 0,
                max: 100,
                grid: {
                    drawOnChartArea: false
                }
            }
        }
    }
});

// Individual Charts
const pollutionChart = createLineChart('pollutionChart', 'Pollution', 'red');
const temperatureChart = createLineChart('temperatureChart', 'Temperature', 'orange');
const humidityChart = createLineChart('humidityChart', 'Humidity', 'blue');

// Update Dashboard
async function updateDashboard() {
    try {
        const response = await fetch(`/latest?t=${Date.now()}`);
        const data = await response.json();

        document.getElementById('pollution').innerText = data.pollution;
        document.getElementById('temperature').innerText = data.temperature;
        document.getElementById('humidity').innerText = data.humidity;

        const labels = data.pollution_history.map((_, i) => i + 1);

        // Combined chart
        combinedChart.data.labels = labels;
        combinedChart.data.datasets[0].data = data.pollution_history;
        combinedChart.data.datasets[1].data = data.temperature_history;
        combinedChart.data.datasets[2].data = data.humidity_history;
        combinedChart.update('none');

        // Individual charts
        pollutionChart.data.labels = labels;
        pollutionChart.data.datasets[0].data = data.pollution_history;
        pollutionChart.update('none');

        temperatureChart.data.labels = labels;
        temperatureChart.data.datasets[0].data = data.temperature_history;
        temperatureChart.update('none');

        humidityChart.data.labels = labels;
        humidityChart.data.datasets[0].data = data.humidity_history;
        humidityChart.update('none');

        // Danger Alert
        document.getElementById("dangerScreen").style.display =
            data.danger ? "flex" : "none";

    } catch (error) {
        console.error("Error fetching data:", error);
    }
}

function closeDanger() {
    document.getElementById("dangerScreen").style.display = "none";
}

// Update every second
setInterval(updateDashboard, 1000);
updateDashboard();
</script>

</body>
</html>
